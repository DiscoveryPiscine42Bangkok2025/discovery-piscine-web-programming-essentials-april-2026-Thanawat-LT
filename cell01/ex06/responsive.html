<!DOCTYPE html>
<html>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;     
            height: 100vh;           
            margin: 0;
            flex-direction: column;               
        }

        hr { 
            width: 100%;
            border: 1px solid black;
        }

        table {
            width: 100vw;
            height: 100vh;
            margin: 0 auto;
            border-collapse: collapse; /* Ensures borders are collapsed together */
        }

        td {
            width: 33.33%;           
            padding: 50px;
            border: 1px solid black;
            border-radius: 1%;
            text-align: center;
            vertical-align: middle;
        }
    </style>
<body>

<hr>

<div style="overflow-x: auto;">
<table>
  <tr>
    <td style="background-color:#afb">
      <p>Superpower</p>
    </td>
    <td style="background-color:#cad">
      <p>Freaky</p>
    </td>
  </tr>

</div>
</body>
</html>
