<!DOCTYPE html>
<html>
<head>
    <title>To Do or Not To Do</title>
    
    <style>
        body {
            background-color: #f0f0f0;
            font-family: sans-serif;
            text-align: center;
        }
        
        #new_btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #333333;
        }
        
        #new_btn:hover {
            background-color: #e0e0e0;
        }

        #ft_list {
            width: 320px;
            min-height: 100px;
            background-color: white;
            border: 2px solid #333333;
            margin: 20px auto;
            padding: 10px;
        }

        .todo-box {
            background-color: #fffbeb;
            border: 1px solid #ffcc00;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            word-wrap: break-word; 
        }
        
        .todo-box:hover {
            background-color: #ffcccc;
            border-color: #ff0000;
        }
    </style>
</head>
<body>

    <h1>To Do List</h1>
    
    <button id="new_btn">New</button>
    
    <div id="ft_list"></div>

    <script src="todo.js"></script>

</body>
</html>
