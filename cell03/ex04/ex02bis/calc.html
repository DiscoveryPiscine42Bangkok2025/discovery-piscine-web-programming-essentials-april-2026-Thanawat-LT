<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<h1>Calculator</h1>

<form id="calcForm">
  <label for="fname">First number: </label>
  <input type="text" id="fname" name="fname"><br><br>

  <label for="operetor">Choose your operator</label>
  <select name="operetor" id="operetor">
    <option value="add">+</option>
    <option value="minus">-</option>
    <option value="multiply">*</option>
    <option value="divide">/</option>
    <option value="modulo">%</option>
  </select><br><br>

  <label for="lname">Second number: </label>
  <input type="text" id="lname" name="lname"><br><br>
  
  <input type="submit" value="Try me">
</form>


<script>
  setInterval(function() {
    alert("Please, use me...");
  }, 30000);

  $("#calcForm").on("submit", function(event) {
    event.preventDefault();

    let first = $("#fname").val();
    let second = $("#lname").val();
    let operator = $("#operetor").val();

    let n1 = Number(first);
    let n2 = Number(second);

    if (
      first.trim() === "" || second.trim() === "" ||
      isNaN(n1) || isNaN(n2) ||
      !Number.isInteger(n1) || !Number.isInteger(n2) ||
      n1 < 0 || n2 < 0
    ) {
      alert("Error :(");
      console.log("Error :(");
      return;
    }

    let result;
    switch(operator) {
      case "add":
        result = n1 + n2;
        break;
      case "minus":
        result = n1 - n2;
        break;
      case "multiply":
        result = n1 * n2;
        break;
      case "divide":
        if (n2 === 0) {
          alert("It's over 9000!");
          return;
        }
        result = n1 / n2;
        break;
      case "modulo":
        if (n2 === 0) {
          alert("It's over 9000!");
          return;
        }
        result = n1 % n2;
        break;
    }

    alert("Result: " + result);
    console.log("Result: " + result);
  });
</script>

</body>
</html>
